site_name: s3lo
site_description: Use S3, GCS, Azure Blob, or local storage as a container image registry. Faster pulls, cheaper storage, no registry to manage.
site_url: https://oufinx.github.io/s3lo
repo_url: https://github.com/OuFinx/s3lo
repo_name: OuFinx/s3lo
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep orange
      accent: orange
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep orange
      accent: orange
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.indexes
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.code.annotate
    - toc.follow
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - tables
  - attr_list
  - md_in_html
  - toc:
      permalink: true

plugins:
  - search

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Commands:
    - commands/index.md
    - push: commands/push.md
    - pull: commands/pull.md
    - copy: commands/copy.md
    - list: commands/list.md
    - inspect: commands/inspect.md
    - delete: commands/delete.md
    - clean: commands/clean.md
    - stats: commands/stats.md
    - config: commands/config.md
    - scan: commands/scan.md
    - sign: commands/sign.md
    - verify: commands/verify.md
  - Concepts:
    - How It Works: concepts/how-it-works.md
    - Storage Layout: concepts/storage-layout.md
    - Deduplication: concepts/deduplication.md
    - Multi-Architecture: concepts/multi-arch.md
    - Authentication: concepts/authentication.md
  - Guides:
    - GitHub Actions: guides/github-actions.md
    - ECR Migration: guides/ecr-migration.md
    - Lifecycle Rules: guides/lifecycle.md
    - Cost Comparison: guides/cost-comparison.md
  - Reference:
    - IAM Policies: reference/iam-policies.md
    - S3 Layout Spec: reference/s3-layout.md
    - Go Library: reference/go-library.md
  - FAQ: faq.md
